name: GrowthCompanion
options:
  bundleIdPrefix: com.growth
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  GrowthCompanion:
    type: application
    platform: iOS
    sources:
      - path: GrowthCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.growth.companion
        INFOPLIST_KEY_CFBundleDisplayName: growth
        INFOPLIST_KEY_NSCameraUsageDescription: Capture plant photos for growth tracking
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Select plant photos to upload to your Mac
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Record short plant videos
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: Connect to the growth app on your Mac over Wi-Fi
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: true
        INFOPLIST_KEY_NSBonjourServices:
          - _growth._tcp
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: GrowthCompanion/Resources/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait